name: Promote development → main

on:
  workflow_dispatch:
    inputs:
      pr_title:
        description: "Pull request title"
        required: false
        default: "Promote development to main"
      pr_body:
        description: "Pull request description"
        required: false
        default: "This PR promotes the latest changes from the `development` branch into `main`."

jobs:
  create-pr:
    name: Open PR from development to main
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;

            // Check if a PR from development → main already exists
            const { data: existingPRs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:development`,
              base: 'main',
            });

            if (existingPRs.length > 0) {
              const pr = existingPRs[0];
              core.notice(`An open PR already exists: #${pr.number} – ${pr.html_url}`);
              return;
            }

            const title = '${{ github.event.inputs.pr_title }}';
            const body  = '${{ github.event.inputs.pr_body }}';

            try {
              const { data: pr } = await github.rest.pulls.create({
                owner,
                repo,
                title,
                body,
                head: 'development',
                base: 'main',
              });

              core.notice(`Pull Request created: #${pr.number} – ${pr.html_url}`);
            } catch (err) {
              // 422 means no commits between the two branches (nothing to promote)
              if (err.status === 422) {
                core.notice('No differences found between `development` and `main`. Nothing to promote.');
              } else {
                core.setFailed(`Failed to create Pull Request: ${err.message}`);
              }
            }
