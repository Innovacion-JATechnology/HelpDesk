name: CI – Build & Validate

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

jobs:
  build:
    name: Build (.NET Framework 4.7.2)
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore HelpDesk.sln

      - name: Build solution
        run: msbuild HelpDesk.sln /p:Configuration=Release /p:Platform="Any CPU" /m /nologo /verbosity:minimal

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helpdesk-build-${{ github.ref_name }}-${{ github.run_number }}
          path: "**/bin/Release/"
          if-no-files-found: warn
